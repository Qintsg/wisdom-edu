  /api/admin/users/{user_id}/reset-password:
    post:
      tags: [管理员-用户管理]
      summary: 重置用户密码
      description: 管理员重置用户密码为默认密码
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
