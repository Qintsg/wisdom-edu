  # ============================================================
  # ============================================================
  # 知识追踪服务
  # ============================================================
  /api/ai/kt/predict:
    post:
      tags: [学生端-AI服务]
      summary: 知识追踪预测
      description: |
        使用深度学习知识追踪模型预测学生对各知识点的掌握程度。
        支持DKT、PEBG两种模型，以及三种预测模式：
        - fusion: 融合模式（默认），同时使用多个模型并加权融合结果
        - single: 单模型模式，仅使用指定的单个模型
        - ensemble: 集成模式，使用多个模型但不融合，返回各模型独立结果
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id, answer_history]
              properties:
                course_id:
                  type: integer
                  description: 课程ID
                answer_history:
                  type: array
                  description: 答题历史记录
                  items:
                    type: object
                    properties:
                      question_id:
                        type: integer
                      correct:
                        type: integer
                        enum: [0, 1]
                      knowledge_point_id:
                        type: integer
                knowledge_points:
                  type: array
                  items:
                    type: integer
                  description: 需要预测的知识点ID列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      predictions:
                        type: object
                        additionalProperties:
                          type: number
                        description: 各知识点掌握率预测
                      confidence:
                        type: number
                        description: 预测置信度
                      model_type:
                        type: string
                        enum: [fusion, single, ensemble, builtin]
                        description: 使用的模型类型
                      prediction_mode:
                        type: string
                        enum: [fusion, single, ensemble]
                        description: 预测模式
                      active_models:
                        type: array
                        items:
                          type: string
                        description: 本次预测使用的模型列表
                      fusion_weights:
                        type: object
                        additionalProperties:
                          type: number
                        description: 融合权重（融合模式下返回）
                      model_results:
                        type: object
                        description: 各模型的独立预测结果（融合模式下返回）
                      analysis:
                        type: string
                        description: 分析说明

  /api/ai/kt/model-info:
    get:
      tags: [学生端-AI服务]
      summary: 获取知识追踪模型信息
      description: 获取当前配置的知识追踪模型的基本信息，包括预测模式、启用的模型和融合权重等
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      prediction_mode:
                        type: string
                        enum: [fusion, single, ensemble]
                        description: 当前预测模式
                      prediction_mode_name:
                        type: string
                        description: 预测模式中文名称
                      enabled_models:
                        type: array
                        items:
                          type: string
                        description: 启用的模型列表
                      fusion_weights:
                        type: object
                        additionalProperties:
                          type: number
                        description: 融合权重配置
                      models:
                        type: object
                        description: 各模型详细信息
                      is_available:
                        type: boolean
                        description: 服务是否可用
                      service_url:
                        type: string
                        description: 远程服务地址

  /api/ai/kt/batch-predict:
    post:
      tags: [教师端-AI服务]
      summary: 批量知识追踪预测
      description: 教师端批量预测多个学生的知识掌握度
      security:
