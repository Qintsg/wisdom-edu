openapi: 3.0.3
info:
  title: 自适应学习系统 API
  description: |
    自适应学习系统后端API文档
    
    知识图谱驱动的个性化自适应学习系统，提供学生端和教师端各功能模块的接口。
    
    ## 技术栈
    - Python 3.12 + Django 6 + DRF
    - PostgreSQL + Neo4j
    - JWT 身份认证
    - DKT知识追踪（PyTorch，开源项目 [pydaxing/Deep-Knowledge-Tracing-DKT-Pytorch](https://github.com/pydaxing/Deep-Knowledge-Tracing-DKT-Pytorch) 提供基础模型）
    - LLM服务（DeepSeek / Qwen-plus，通过LangChain编排）
    
    ## API命名规范
    ```
    /api/auth/*      - 认证接口（登录、注册、token）
    /api/student/*   - 学生专用接口
    /api/teacher/*   - 教师专用接口
    /api/admin/*     - 管理员专用接口
    /api/courses     - 公共课程查询接口
    ```
    
    ## 通用响应格式
    ```json
    {
      "code": 200,
      "msg": "成功",
      "data": { ... }
    }
    ```
    
    ## 认证方式
    除注册、登录等开放接口外，其余接口均需在请求头附带JWT Token：
    ```
    Authorization: Bearer <access_token>
    ```
    
  version: 1.0.0
  contact:
    name: Qintsg
  license:
    name: None
  x-changelog: |
    v1.0.1 (2026-03-05):
    - 文档元信息更新：技术栈版本、文档时间戳
    - 与安装文档和后端配置说明保持一致

    v1.0.0 (2025-02-15):
    - 新增46个接口，总计139个API端点
    - 完善管理员用户管理模块（8个接口）
    - 完善管理员课程和班级管理模块（9个接口）
    - 完善学生端学习路径模块（9个接口）
    - 完善教师端作业管理模块（7个接口）
    - 新增系统健康检查接口
    - 新增初始评测start/submit接口
    - 新增教师知识图谱关系查询接口
    - 统一所有接口的参数命名规范
    - 所有接口与实际代码完全对照一致

servers:
  - url: http://localhost:8000
    description: 开发服务器

tags:
  - name: 系统
    description: 系统健康检查和基础接口
  - name: 认证
    description: 用户注册、登录、Token管理
  - name: 用户信息
    description: 用户信息查询和更新
  - name: 学生端-画像
    description: 学习者画像查询和更新
  - name: 学生端-班级
    description: 学生班级管理（加入/退出）
  - name: 学生端-课程
    description: 课程查询和选择
  - name: 学生端-知识图谱
    description: 知识点、关系和掌握度
  - name: 学生端-测评
    description: 初始测评（能力、习惯、知识）
  - name: 学生端-学习路径
    description: 个性化学习路径
  - name: 学生端-作业
    description: 作业和反馈
  - name: 学生端-AI服务
    description: AI分析、推荐和知识追踪
  - name: 教师端-课程管理
    description: 教师课程和班级管理
  - name: 教师端-班级管理
    description: 班级邀请码和学生管理
  - name: 教师端-知识图谱
    description: 教师知识点和资源管理
  - name: 教师端-题库
    description: 教师题库管理
  - name: 教师端-作业管理
    description: 作业创建和发布
  - name: 教师端-AI服务
    description: 教师端AI分析服务（批量知识追踪等）
  - name: 管理员-用户管理
    description: 激活码和用户管理
  - name: 管理员-课程管理
    description: 管理端课程管理
  - name: 管理员-班级管理
    description: 管理端班级管理
  - name: 管理员-统计
    description: 管理端统计概览
  - name: 管理员-日志
    description: 系统操作日志

paths:
  # ============================================================
  # 系统健康检查
  # ============================================================
  /health/:
    get:
      tags: [系统]
      summary: 健康检查
      description: 系统健康状态检查接口，无需认证
      responses:
        '200':
          description: 系统正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  # ============================================================
  # 认证接口
  # ============================================================
  /api/auth/register:
    post:
      tags: [认证]
      summary: 用户注册
      description: |
        注册新用户账号。
        - 学生可直接注册
        - 教师/管理员需要提供激活码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 50
                  example: student1
                password:
                  type: string
                  minLength: 8
                  example: Test123456
                email:
                  type: string
                  format: email
                  example: student@example.com
                role:
                  type: string
                  enum: [student, teacher, admin]
                  example: student
                activation_code:
                  type: string
                  description: 教师/管理员注册需要
                  example: TEACHER1
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: 参数错误或用户名已存在

  /api/auth/login:
    post:
      tags: [认证]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: student1
                password:
                  type: string
                  example: Test123456
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 用户名或密码错误

  /api/auth/token/refresh:
    post:
      tags: [认证]
      summary: 刷新Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh:
                  type: string
                  description: Refresh Token
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
        '401':
          description: Token无效或已过期

  /api/auth/password/change:
    post:
      tags: [认证]
      summary: 修改密码
      description: 用户修改自己的密码，需要验证旧密码
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                  description: 旧密码
                new_password:
                  type: string
                  description: 新密码（8位以上）
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  msg:
                    type: string
                    example: 密码修改成功
        '400':
          description: 旧密码错误或新密码格式不正确

  /api/auth/logout:
    post:
      tags: [认证]
      summary: 退出登录
      description: |
        退出登录接口。JWT是无状态的，服务端主要用于记录退出日志。
        客户端调用后应清除本地存储的Token。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  msg:
                    type: string
                    example: 退出成功

  # ============================================================
  # 用户信息
  # ============================================================
  /api/auth/userinfo:
    get:
      tags: [用户信息]
      summary: 获取当前用户信息
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'

  /api/auth/userinfo/update:
    put:
      tags: [用户信息]
      summary: 更新用户信息
      description: |
        可更新字段：email, phone, real_name, student_id
        - phone需要符合中国手机号格式（11位，1开头）
        - email需要符合邮箱格式
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  pattern: '^1[3-9]\d{9}$'
                  example: "13800138000"
                real_name:
                  type: string
                student_id:
                  type: string
      responses:
        '200':
          description: 更新成功
        '400':
          description: 格式校验失败

  # ============================================================
  # 学习者画像
  # ============================================================
  /api/student/profile:
    get:
      tags: [学生端-画像]
      summary: 获取学习者画像
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'

  /api/student/profile/habit:
    put:
      tags: [学生端-画像]
      summary: 更新学习习惯偏好
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferred_resource:
                  type: string
                  enum: [video, document, exercise, mixed]
                preferred_study_time:
                  type: string
                  enum: [morning, afternoon, evening]
                study_pace:
                  type: string
                  enum: [slow, moderate, fast, adaptive]
      responses:
        '200':
          description: 更新成功

  /api/student/profile/update:
    put:
      tags: [学生端-画像]
      summary: 更新学生画像
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id]
              properties:
                course_id:
                  type: integer
      responses:
        '200':
          description: 更新成功

  /api/student/profile/history:
    get:
      tags: [学生端-画像]
      summary: 获取画像历史
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  # ============================================================
  # 班级管理（学生端）
  # ============================================================
  /api/student/classes:
    get:
      tags: [学生端-班级]
      summary: 获取我的班级列表
      description: 获取学生加入的所有班级
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      classes:
                        type: array
                        items:
                          type: object
                          properties:
                            class_id:
                              type: integer
                            class_name:
                              type: string
                            course_id:
                              type: integer
                            course_name:
                              type: string
                            teacher_name:
                              type: string
                            enrolled_at:
                              type: string

  /api/student/classes/{class_id}:
    get:
      tags: [学生端-班级]
      summary: 获取班级详情
      description: 查看班级详细信息
      security:
        - BearerAuth: []
      parameters:
        - name: class_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      class_id:
                        type: integer
                      class_name:
                        type: string
                      course_id:
                        type: integer
                      course_name:
                        type: string
                      teacher_name:
                        type: string
                      student_count:
                        type: integer

  /api/student/classes/join:
    post:
      tags: [学生端-班级]
      summary: 加入班级
      description: 通过邀请码加入班级
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  example: JOIN01
      responses:
        '200':
          description: 加入成功
        '400':
          description: 邀请码无效或已过期
        '404':
          description: 邀请码不存在

  /api/student/classes/{class_id}/leave:
    delete:
      tags: [学生端-班级]
      summary: 退出班级
      security:
        - BearerAuth: []
      parameters:
        - name: class_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 退出成功
        '404':
          description: 未加入此班级

  # ============================================================
  # 课程
  # ============================================================
  /api/courses:
    get:
      tags: [学生端-课程]
      summary: 获取课程列表
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功

  /api/courses/select:
    post:
      tags: [学生端-课程]
      summary: 选择课程
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id]
              properties:
                course_id:
                  type: integer
      responses:
        '200':
          description: 成功

  /api/courses/search:
    get:
      tags: [学生端-课程]
      summary: 搜索课程
      security:
        - BearerAuth: []
      parameters:
        - name: query
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功

  # ============================================================
  # 知识图谱
  # ============================================================
  /api/student/knowledge-map:
    get:
      tags: [学生端-知识图谱]
      summary: 获取知识图谱
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeMapResponse'

  /api/student/knowledge-points/{point_id}:
    get:
      tags: [学生端-知识图谱]
      summary: 获取知识点详情
      security:
        - BearerAuth: []
      parameters:
        - name: point_id
          in: path
          required: true
          schema:
            type: integer
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/student/knowledge/points:
    get:
      tags: [学生端-知识图谱]
      summary: 获取知识点列表
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
        - name: chapter
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/student/knowledge/relations:
    get:
      tags: [学生端-知识图谱]
      summary: 获取知识点关系
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/student/knowledge/mastery:
    get:
      tags: [学生端-知识图谱]
      summary: 获取知识掌握度
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  # ============================================================
  # 测评
  # ============================================================
  /api/student/assessments/status:
    get:
      tags: [学生端-测评]
      summary: 获取评测完成状态
      description: |
        检查用户的初始评测完成状态：
        - global_assessment_done: 全局评测（能力+习惯）是否完成
        - courses: 各课程的知识评测状态
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/student/assessments/initial/ability:
    get:
      tags: [学生端-测评]
      summary: 获取能力评测试题
      description: 新用户注册后进行（全局）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功

  /api/student/assessments/initial/ability/retake:
    get:
      tags: [学生端-测评]
      summary: 重新进行能力评测
      description: 能力评测为全局问卷，重做将覆盖历史结果
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功

  /api/student/assessments/initial/ability/submit:
    post:
      tags: [学生端-测评]
      summary: 提交能力评测
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  items:
                    type: object
                    properties:
                      question_id:
                        type: integer
                      answer:
                        type: string
      responses:
        '200':
          description: 成功

  /api/student/assessments/initial/habit:
    get:
      tags: [学生端-测评]
      summary: 获取习惯问卷
      description: 新用户注册后进行（全局）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功

  /api/student/assessments/initial/habit/submit:
    post:
      tags: [学生端-测评]
      summary: 提交习惯问卷
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [responses]
              properties:
                responses:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: 成功

  /api/student/assessments/initial/knowledge:
    get:
      tags: [学生端-测评]
      summary: 获取知识评测试题
      description: 加入课程后进行
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/student/assessments/initial/knowledge/submit:
    post:
      tags: [学生端-测评]
      summary: 提交知识评测
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id, answers]
              properties:
                course_id:
                  type: integer
                answers:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: 成功

  /api/student/assessments/profile/generate:
    post:
      tags: [学生端-测评]
      summary: 生成课程学习者画像
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id]
              properties:
                course_id:
                  type: integer
      responses:
        '200':
          description: 成功

  # ============================================================
  # 学习路径
  # ============================================================
  /api/student/learning-path:
    get:
      tags: [学生端-学习路径]
      summary: 获取学习路径
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/student/learning-path/adjust:
    post:
      tags: [学生端-学习路径]
      summary: 调整学习路径
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id]
              properties:
                course_id:
                  type: integer
      responses:
        '200':
          description: 成功

  /api/student/learning-progress:
    get:
      tags: [学生端-学习路径]
      summary: 获取学习进度
      description: 获取学生在课程中的整体学习进度
      security:
        - BearerAuth: []
      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
      responses:
