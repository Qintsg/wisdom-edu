      description: 管理员直接创建用户账号
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username:
                  type: string
                  minLength: 3
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [student, teacher, admin]
                email:
                  type: string
                real_name:
                  type: string
                student_id:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 201
                  msg:
                    type: string
                    example: 用户创建成功
                  data:
                    type: object
                    properties:
                      user_id:
                        type: integer

  /api/admin/users/{user_id}:
    get:
      tags: [管理员-用户管理]
      summary: 获取用户详情
