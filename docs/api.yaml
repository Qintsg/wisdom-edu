        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                new_password:
                  type: string
                  description: 新密码（可选，不填则使用默认密码）
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      new_password:
                        type: string
                        description: 新密码（如未指定）

  /api/admin/users/{user_id}/disable:
    post:
