components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: 登录成功
        data:
          type: object
          properties:
            access:
              type: string
            refresh:
              type: string
            user:
              $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        real_name:
          type: string
        student_id:
          type: string

    UserInfoResponse:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            user_id:
              type: integer
            username:
              type: string
            role:
              type: string
            email:
              type: string
            phone:
              type: string
            real_name:
              type: string
            student_id:
              type: string
            classes:
              type: array
              items:
                $ref: '#/components/schemas/ClassInfo'
            courses:
              type: array
              items:
                type: object
                properties:
                  course_id:
                    type: integer
                  course_name:
                    type: string

    ClassInfo:
      type: object
      properties:
        class_id:
          type: integer
        class_name:
          type: string
        course_id:
          type: integer
        course_name:
          type: string
        teacher_name:
          type: string
        semester:
          type: string
        role:
          type: string
        enrolled_at:
          type: string
          format: date-time
        student_count:
          type: integer

    ProfileResponse:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            user_id:
              type: integer
            course_id:
              type: integer
            summary:
              type: string
            weakness:
              type: string
            suggestion:
              type: string
            mastery:
              type: array
              items:
                type: object
                properties:
                  point_id:
                    type: integer
                  point_name:
                    type: string
                  mastery_rate:
                    type: number
            habit_preferences:
              type: object

    KnowledgeMapResponse:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          type: object
          properties:
            nodes:
              type: array
              items:
                type: object
                properties:
                  point_id:
                    type: integer
                  point_name:
                    type: string
                  mastery_rate:
                    type: number
                  chapter:
                    type: string
                  type:
                    type: string
            edges:
              type: array
              items:
                type: object
                properties:
                  source:
                    type: integer
                  target:
                    type: integer
                  relation:
                    type: string
