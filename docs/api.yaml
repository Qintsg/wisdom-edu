  /api/admin/users:
    get:
      tags: [管理员-用户管理]
      summary: 获取用户列表
      description: 管理员获取所有用户列表，支持分页、搜索和角色筛选
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
          description: 搜索用户名、真实姓名或学号
        - name: role
          in: query
          schema:
            type: string
            enum: [student, teacher, admin]
          description: 按角色筛选
        - name: status
          in: query
          schema:
            type: string
            enum: [active, disabled]
          description: 按状态筛选
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  msg:
                    type: string
                    example: 成功
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id:
                              type: integer
                            username:
                              type: string
                            real_name:
                              type: string
                            email:
                              type: string
                            role:
                              type: string
                            is_active:
                              type: boolean
                            created_at:
                              type: string
                      total:
                        type: integer
                      page:
                        type: integer
                      page_size:
                        type: integer

  /api/admin/users/create:
