      parameters:
        - name: course_id
          in: query
          required: true
          schema:
            type: integer
        - name: type
          in: query
          description: 资源类型筛选
          schema:
            type: string
            enum: [video, document, link, exercise]
        - name: keyword
          in: query
          description: 关键词搜索
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        resource_id:
                          type: integer
                        title:
                          type: string
                        type:
                          type: string
                        url:
                          type: string
                        format:
                          type: string
                        duration:
                          type: integer
                          description: 视频时长(秒)
                          nullable: true
                        duration_display:
                          type: string
                          description: 格式化时长显示，如"05:30"
                          nullable: true
                        chapter_number:
                          type: string
                          description: 章节编号，如"1.1"
                          nullable: true
                        sort_order:
                          type: integer
                          description: 排序序号

