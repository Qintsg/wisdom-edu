      responses:
        '200':
          description: 更新成功

  /api/admin/users/{user_id}/delete:
    delete:
      tags: [管理员-用户管理]
      summary: 删除用户
      description: 管理员删除用户账号（软删除）
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
