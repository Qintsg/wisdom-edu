# =============================================================================
# 自适应学习系统 - 系统配置文件
# Adaptive Learning System - System Configuration
# =============================================================================
#
# 说明：
# 本文件包含系统的业务配置参数（非敏感信息）。
# 敏感信息（数据库密码、API密钥等）请在 .env 文件中配置。
#
# 配置读取：
# 使用 common.config 模块读取配置：
#   from common.config import get_config
#   value = get_config('section', 'key', default='默认值')
#
# =============================================================================

# -----------------------------------------------------------------------------
# 认证配置 Authentication
# JWT令牌和密码规则设置
# -----------------------------------------------------------------------------
[authentication]
# Access Token有效期（分钟）| Access Token lifetime in minutes
access_token_lifetime_minutes = 120

# Refresh Token有效期（天）| Refresh Token lifetime in days
refresh_token_lifetime_days = 7

# 密码最小长度 | Minimum password length
password_min_length = 8

# 密码是否要求大写字母 | Require uppercase letters
password_require_uppercase = true

# 密码是否要求数字 | Require numbers
password_require_numbers = true

# 密码是否要求特殊字符 | Require special characters
password_require_special = false


# -----------------------------------------------------------------------------
# 分页配置 Pagination
# API列表接口的默认分页设置
# -----------------------------------------------------------------------------
[pagination]
# 默认每页数量 | Default page size
default_page_size = 20

# 最大每页数量 | Maximum page size
max_page_size = 100


# -----------------------------------------------------------------------------
# 初始测评配置 Initial Assessment
# 新用户注册后的能力测评设置
# -----------------------------------------------------------------------------
[initial_assessment]
# 默认测评题目数量 | Default question count
default_question_count = 10

# 最小题目数量 | Minimum question count
min_question_count = 5

# 最大题目数量 | Maximum question count
max_question_count = 50


# -----------------------------------------------------------------------------
# 考试配置 Exam
# 考试相关的默认设置
# -----------------------------------------------------------------------------
[exam]
# 默认考试时长（分钟）| Default duration in minutes
default_duration_minutes = 60

# 默认及格分数比例（0-1）| Default pass ratio
default_pass_ratio = 0.6

# 是否允许提前交卷 | Allow early submission
allow_early_submit = true

# 交卷后是否显示成绩 | Show score after submission
show_score_after_submit = true


# -----------------------------------------------------------------------------
# 学生画像配置 Student Profile
# 学习者画像的更新和存储设置
# -----------------------------------------------------------------------------
[profile]
# 自动更新间隔（天）| Auto update interval in days
auto_update_interval_days = 7

# 保留的历史记录数量 | Number of history records to keep
history_records_limit = 100


# -----------------------------------------------------------------------------
# 知识图谱配置 Knowledge Graph
# 知识点和掌握度的相关设置
# -----------------------------------------------------------------------------
[knowledge]
# 知识点最大层级 | Maximum level depth
max_level = 7

# 掌握度阈值（0-1），低于此值视为未掌握 | Mastery threshold
mastery_threshold = 0.6


# -----------------------------------------------------------------------------
# 文件上传配置 File Upload
# 上传文件的大小和格式限制
# -----------------------------------------------------------------------------
[file_upload]
# 最大文件大小（MB）| Maximum file size in MB
max_file_size_mb =1024

# 允许的图片格式（逗号分隔）| Allowed image formats
allowed_image_formats = jpg,jpeg,png,gif,webp

# 允许的文档格式 | Allowed document formats
allowed_document_formats = pdf,doc,docx,ppt,pptx,xls,xlsx,txt,md

# 允许的视频格式 | Allowed video formats
allowed_video_formats = mp4,avi,mov,wmv,flv,mkv


# -----------------------------------------------------------------------------
# 日志配置 Logging
# 操作日志的记录设置
# -----------------------------------------------------------------------------
[logging]
# 是否启用操作日志 | Enable operation logging
operation_log_enabled = true

# 是否记录GET请求 | Log GET requests
log_get_requests = true

# 日志保留天数 | Log retention days
retention_days = 90


# -----------------------------------------------------------------------------
# AI服务配置 AI Services
# 大模型调用相关设置
# -----------------------------------------------------------------------------
[ai_services]
# 外部API超时时间（秒）| API timeout in seconds
api_timeout = 120

# 是否启用AI反馈报告 | Enable AI feedback reports
ai_feedback_enabled = true


# -----------------------------------------------------------------------------
# 大模型配置 LLM
# 默认模型、接口格式与非敏感网关配置。
# API Key 等敏感信息请仍放在 backend/.env 中。
# -----------------------------------------------------------------------------
[llm]
# 默认提供方 | Default provider
provider = deepseek

# 默认模型名称 | Default model name
model = deepseek-v4-pro

# 接口格式 | API format
api_format = openai-compatible

# 统一网关地址（留空表示按提供方默认地址）
# Unified gateway base URL (empty means provider default)
base_url =

# 请求超时时间（秒）| Request timeout in seconds
request_timeout_seconds = 120

# 最大重试次数 | Maximum retries
max_retries = 2

# 是否启用推理/思考模式 | Enable reasoning/thinking mode
reasoning_enabled = false

# 推理强度（仅 reasoning_enabled=true 时生效）
reasoning_effort =

# 透传给 OpenAI 兼容网关的额外 JSON 请求体
extra_body_json = {"enable_thinking": false}


# -----------------------------------------------------------------------------
# GraphRAG 配置 GraphRAG
# 控制课程级混合检索的向量器与本地向量库存储。
# -----------------------------------------------------------------------------
[graphrag]
# 向量器提供方（hash / sentence_transformer）| Embedder provider
embedder_provider = hash

# 本地语义向量模型 | Local sentence model
sentence_model = sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

# 向量维度 | Vector dimension
vector_dimension = 256

# Qdrant 本地持久化目录 | Local Qdrant path
qdrant_path = runtime_logs/rag/qdrant


# -----------------------------------------------------------------------------
# 激活码配置 Activation Code
# 教师/管理员注册激活码设置
# -----------------------------------------------------------------------------
[activation_code]
# 激活码长度（字符数）| Code length
code_length = 8

# 默认过期时间（天），0表示永不过期 | Default expiration days (0 = never)
default_expiration_days = 0


# -----------------------------------------------------------------------------# 学习路径配置 Learning Path
# 学习路径生成相关设置
# -----------------------------------------------------------------------------
[learning_path]
# 学习路径最大节点数 | Maximum number of path nodes
max_nodes = 100

# 每几个学习节点插入一个测试节点 | Insert test node every N study nodes
test_interval = 3


# -----------------------------------------------------------------------------# 邀请码配置 Invitation Code
# 班级邀请码设置
# -----------------------------------------------------------------------------
[invitation_code]
# 邀请码长度（字符数）| Code length
code_length = 6

# 默认最大使用次数，0表示无限制 | Default max uses (0 = unlimited)
default_max_uses = 0

# 默认过期时间（天）| Default expiration days
default_expiration_days = 7
